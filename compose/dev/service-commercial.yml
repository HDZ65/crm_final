services:
  crm-service-commercial:
    build:
      context: ../..
      dockerfile: services/service-commercial/Dockerfile
      target: development
    container_name: dev-crm-service-commercial # <--- Unique par dev
    ports:
      - "127.0.0.1:3408:3053"   # HTTP
    env_file:
      - ../../services/service-commercial/.env.development
    environment:
      - NODE_PATH=/app/services/service-commercial/node_modules
      # On surcharge l'accès DB pour pointer le container global
      - DATABASE_URL=postgresql://postgres:postgres@dev-crm-postgres:5432/crm_commercial
      - MIGRATIONS_RUN=false
      - WINLEADPLUS_API_URL=https://winleadplus.com/api/prospects
    # depends_on retiré car dev-crm-postgres est externe
    networks:
      - crm_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3053, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/service-commercial/src
          target: /app/services/service-commercial/src
          ignore:
            - "node_modules/"
            - "dist/"
        - action: rebuild
          path: ./services/service-commercial/package.json

networks:
  crm_dev_net:
    name: crm_dev_network
    driver: bridge
