services:
  crm-service-core:
    build:
      context: ../..
      dockerfile: services/service-core/Dockerfile
      target: development
    container_name: dev-crm-service-core
    ports:
      - "127.0.0.1:3407:3052"   # HTTP
    env_file:
      - ../../services/service-core/.env.development
    environment:
      - NODE_PATH=/app/services/service-core/node_modules
      - DATABASE_URL=postgresql://postgres:postgres@dev-crm-postgres:5432/crm_core
      - REDIS_HOST=dev-crm-redis
      - REDIS_PORT=6379
      - NATS_URL=nats://dev-crm-nats:4222
      - CONSUL_HOST=dev-crm-consul
      - CONSUL_PORT=8500
      - MIGRATIONS_RUN=false
    depends_on:
      - postgres
      - redis
      - nats
      - consul
    networks:
      - crm_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3052, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/service-core/src
          target: /app/services/service-core/src
          ignore:
            - "node_modules/"
            - "dist/"
        - action: rebuild
          path: ./services/service-core/package.json

networks:
  crm_dev_net:
    name: crm_dev_network
    driver: bridge