services:
  crm-service-engagement:
    build:
      context: ../..
      dockerfile: services/service-engagement/Dockerfile
      target: development
    container_name: dev-crm-service-engagement # <--- Identifiant unique
      # URL pour tes tests HTTP : http://dev-crm-engagement.local:8081
    ports:
      - "127.0.0.1:3410:3051"   # HTTP
      # gRPC 50051 internal only (docker network)
    env_file:
      - ../../services/service-engagement/.env.development
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@dev-crm-postgres:5432/crm_engagement
      - REDIS_HOST=dev-crm-redis
      - REDIS_PORT=6379
      - NATS_URL=nats://dev-crm-nats:4222
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - crm_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3061, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/service-engagement/src
          target: /app/services/service-engagement/src
          ignore:
            - "node_modules/"

networks:
  crm_dev_net:
    name: crm_dev_network
    driver: bridge
