services:
  crm-service-finance:
    build:
      context: ../..
      dockerfile: services/service-finance/Dockerfile
      target: development
    container_name: dev-crm-service-finance # <--- Identifiant unique
      # Accès via : http://dev-crm-finance.local:8081
    ports:
      - "127.0.0.1:3409:3059"   # HTTP
      # gRPC 50059 internal only (docker network)
    env_file:
      - ../../services/service-finance/.env.development
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@dev-crm-postgres:5432/crm_finance
      - REDIS_HOST=dev-crm-redis
      - REDIS_PORT=6379
      - NATS_URL=nats://dev-crm-nats:4222
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - crm_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3059, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/service-finance/src
          target: /app/services/service-finance/src
          ignore:
            - "node_modules/"

networks:
  crm_dev_net:
    name: crm_dev_network
    driver: bridge
