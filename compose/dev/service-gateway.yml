services:
  crm-service-gateway:
    build:
      context: ../..
      dockerfile: services/service-gateway/Dockerfile
      target: development
    container_name: dev-crm-service-gateway # <--- Unique par dev
    ports:
      - "127.0.0.1:3411:3050"   # HTTP
    env_file:
      - ../../services/service-gateway/.env.development
    environment:
      - NATS_URL=nats://dev-crm-nats:4222
      - REDIS_HOST=dev-crm-redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - crm_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3405, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/service-gateway/src
          target: /app/services/service-gateway/src
          ignore:
            - "node_modules/"

networks:
  crm_dev_net:
    name: crm_dev_network
    driver: bridge
