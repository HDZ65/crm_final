services:
  crm-service-gateway:
    build:
      context: ../..
      dockerfile: services/service-gateway/Dockerfile
      target: development
    container_name: alex-service-gateway # <--- Unique par dev
    ports:
      - "3405:3405"
    env_file:
      - ../../services/service-gateway/.env.development
    environment:
      - NODE_PATH=/app/services/service-gateway/node_modules
      # Override NATS to use Docker network DNS name
      - NATS_URL=nats://alex-crm-nats:4222
      # Override gRPC to use Docker network DNS name
      - GRPC_CONTRAT_URL=alex-service-commercial:50053
    networks:
      - shared_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3405, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/service-gateway/src
          target: /app/services/service-gateway/src
          ignore:
            - "node_modules/"
            - "dist/"
        - action: rebuild
          path: ./services/service-gateway/package.json

networks:
  shared_dev_net:
    external: true
