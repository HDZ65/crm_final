services:
  crm-service-logistics:
    build:
      context: ../..
      dockerfile: services/service-logistics/Dockerfile
      target: development
    container_name: dev-crm-service-logistics # <--- Identifiant unique
      # Configuration pour gRPC (si tu veux utiliser dev-crm-logistics.local)
      # Indique à Traefik que c'est du h2c (gRPC sans TLS)
    ports:
      - "127.0.0.1:3412:3060"   # HTTP
    env_file:
      - ../../services/service-logistics/.env.development
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@dev-crm-postgres:5432/crm_logistics
      - REDIS_HOST=dev-crm-redis
      - REDIS_PORT=6379
      - NATS_URL=nats://dev-crm-nats:4222
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - crm_dev_net
    healthcheck:
      # Test de connexion TCP sur le port gRPC
      test: ["CMD", "node", "-e", "require('net').connect(50060, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/service-logistics/src
          target: /app/services/service-logistics/src
          ignore:
            - "node_modules/"

networks:
  crm_dev_net:
    name: crm_dev_network
    driver: bridge
