services:
  crm-service-telecom:
    build:
      context: ../..
      dockerfile: services/service-telecom/Dockerfile
      target: development
    container_name: alex-service-telecom
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alex-telecom.rule=Host(`alex-telecom.local`)"
      - "traefik.http.services.alex-telecom.loadbalancer.server.port=3056"
    ports:
      - "3407:3056"
    env_file:
      - ../../services/service-telecom/.env.development
    environment:
      - NODE_PATH=/app/services/service-telecom/node_modules
      - DATABASE_URL=postgresql://postgres:postgres@global_postgres:5432/alex_telecom
      - MIGRATIONS_RUN=false
      - GRPC_PORT=50077
    networks:
      - shared_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3056, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  shared_dev_net:
    external: true
