services:
  crm-service-telecom:
    build:
      context: ../..
      dockerfile: services/service-telecom/Dockerfile
      target: development
    container_name: dev-crm-service-telecom
    ports:
      - "127.0.0.1:3413:3077"   # HTTP
    env_file:
      - ../../services/service-telecom/.env.development
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@dev-crm-postgres:5432/crm_telecom
      - REDIS_HOST=dev-crm-redis
      - REDIS_PORT=6379
      - NATS_URL=nats://dev-crm-nats:4222
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - crm_dev_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3056, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  crm_dev_net:
    name: crm_dev_network
    driver: bridge
