services:
  crm-service-core:
    build:
      context: ../..
      dockerfile: services/service-core/Dockerfile
      target: production
    container_name: prod-crm-service-core
    ports:
      - "127.0.0.1:3402:3052"
    env_file:
      - ../../services/service-core/.env.production
    environment:
      - NODE_PATH=/app/services/service-core/node_modules
      - DATABASE_URL=postgresql://postgres:postgres@prod-crm-postgres:5432/prod_core
      - MIGRATIONS_RUN=false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm-prod-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3052, 'localhost').on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  crm-prod-network:
