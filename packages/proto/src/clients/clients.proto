syntax = "proto3";

package clients;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "common/common.proto";

option java_multiple_files = true;
option java_package = "com.finanssor.crm.clients";

// ============================================================================
// CLIENTS MICROSERVICE - gRPC Service Definitions
// ============================================================================
// Manages client data: individuals, enterprises, addresses, and partnerships
// ============================================================================

// === ENUMS ===

enum ClientType {
  CLIENT_TYPE_UNSPECIFIED = 0;
  CLIENT_TYPE_PARTICULIER = 1;
  CLIENT_TYPE_ENTREPRISE = 2;
  CLIENT_TYPE_ASSOCIATION = 3;
}

enum Civilite {
  CIVILITE_UNSPECIFIED = 0;
  CIVILITE_M = 1;
  CIVILITE_MME = 2;
}

enum KycStatus {
  KYC_STATUS_UNSPECIFIED = 0;
  KYC_STATUS_PENDING = 1;
  KYC_STATUS_VERIFIED = 2;
  KYC_STATUS_REJECTED = 3;
  KYC_STATUS_EXPIRED = 4;
}

enum AddressType {
  ADDRESS_TYPE_UNSPECIFIED = 0;
  ADDRESS_TYPE_DOMICILE = 1;
  ADDRESS_TYPE_FACTURATION = 2;
  ADDRESS_TYPE_LIVRAISON = 3;
  ADDRESS_TYPE_SIEGE = 4;
}

// === STATUT CLIENT ===

message StatutClient {
  string id = 1;
  string code = 2;
  string nom = 3;
  string description = 4;
  int32 ordre_affichage = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateStatutClientRequest {
  string code = 1;
  string nom = 2;
  string description = 3;
  int32 ordre_affichage = 4;
}

message UpdateStatutClientRequest {
  string id = 1;
  optional string code = 2;
  optional string nom = 3;
  optional string description = 4;
  optional int32 ordre_affichage = 5;
}

message GetStatutClientRequest {
  string id = 1;
}

message GetStatutClientByCodeRequest {
  string code = 1;
}

message ListStatutsClientRequest {
  common.PaginationRequest pagination = 1;
}

message ListStatutsClientResponse {
  repeated StatutClient statuts = 1;
  common.PaginationResponse pagination = 2;
}

message DeleteStatutClientRequest {
  string id = 1;
}

// === ADRESSE ===

message Adresse {
  string id = 1;
  string client_base_id = 2;
  string ligne1 = 3;
  string ligne2 = 4;
  string code_postal = 5;
  string ville = 6;
  string pays = 7;
  AddressType type = 8;
  bool is_primary = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;

  // Reserved for future use
  reserved 50 to 100;
}

message CreateAdresseRequest {
  string client_base_id = 1;
  string ligne1 = 2;
  string ligne2 = 3;
  string code_postal = 4;
  string ville = 5;
  string pays = 6;
  AddressType type = 7;
  bool is_primary = 8;
}

message UpdateAdresseRequest {
  string id = 1;
  optional string ligne1 = 2;
  optional string ligne2 = 3;
  optional string code_postal = 4;
  optional string ville = 5;
  optional string pays = 6;
  optional AddressType type = 7;
  optional bool is_primary = 8;
}

message GetAdresseRequest {
  string id = 1;
}

message ListAdressesRequest {
  string client_base_id = 1;
  common.PaginationRequest pagination = 2;
}

message ListAdressesResponse {
  repeated Adresse adresses = 1;
  common.PaginationResponse pagination = 2;
}

message DeleteAdresseRequest {
  string id = 1;
}

// === CLIENT BASE - COMPOSED STRUCTURE ===

// Identity information for a client
message ClientIdentity {
  string nom = 1;
  string prenom = 2;
  Civilite civilite = 3;
  google.protobuf.Timestamp date_naissance = 4;
  string lieu_naissance = 5;
  string pays_naissance = 6;
  string profession = 7;
  string csp = 8;                    // Catégorie socio-professionnelle
  string regime_social = 9;
}

// Contact information
message ClientContact {
  string telephone = 1;
  string email = 2;
  string langue = 3;                 // ISO 639-1: "fr", "en"
}

// Banking information
message ClientBanking {
  string iban = 1;
  string bic = 2;
  bool mandat_sepa = 3;
  google.protobuf.Timestamp mandat_sepa_date = 4;
  string mandat_sepa_reference = 5;
}

// Subscribed services flags
message ClientServices {
  bool has_conciergerie = 1;
  bool has_justi_plus = 2;
  bool has_wincash = 3;
  string uuid_wincash = 4;
  string uuid_justi_plus = 5;
  string uuid_conciergerie = 6;
}

// Compliance and regulatory information
message ClientCompliance {
  KycStatus kyc_status = 1;
  google.protobuf.Timestamp kyc_verified_at = 2;
  bool gdpr_consent = 3;
  google.protobuf.Timestamp gdpr_consent_date = 4;
  bool is_politically_exposed = 5;  // PEP status
  string numss = 6;                  // Numéro de sécurité sociale
  string num_organisme = 7;          // Numéro organisme
}

// Acquisition information
message ClientAcquisition {
  string canal_acquisition = 1;      // "web", "phone", "agency"
  string source = 2;                 // Lead source
  google.protobuf.Timestamp date_premiere_souscription = 3;
  string etape_courante = 4;         // Current onboarding step
}

// Main client entity - composed of sub-messages
message ClientBase {
  // Core identifiers
  string id = 1;
  string organisation_id = 2;
  string compte_code = 3;
  ClientType type_client = 4;
  string statut = 5;

  // Composed sub-messages
  ClientIdentity identity = 6;
  ClientContact contact = 7;
  ClientBanking banking = 8;
  ClientServices services = 9;
  ClientCompliance compliance = 10;
  ClientAcquisition acquisition = 11;

  // Relations
  repeated Adresse adresses = 12;
  string partenaire_id = 13;
  string societe_id = 14;

  // Audit fields
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  google.protobuf.Timestamp deleted_at = 17;  // Soft delete

  // Reserved for future use - NEVER reuse these numbers
  reserved 50 to 100;
  reserved "legacy_field", "deprecated_status";
}

// Lightweight client summary for lists
message ClientSummary {
  string id = 1;
  string compte_code = 2;
  string nom_complet = 3;            // "Dupont Jean"
  string email = 4;
  string telephone = 5;
  string statut = 6;
  ClientType type_client = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateClientBaseRequest {
  string organisation_id = 1;
  ClientType type_client = 2;
  string compte_code = 3;
  string statut = 4;

  // Composed data
  ClientIdentity identity = 5;
  ClientContact contact = 6;
  ClientBanking banking = 7;
  ClientServices services = 8;
  ClientCompliance compliance = 9;
  ClientAcquisition acquisition = 10;

  // Relations
  string partenaire_id = 11;
  string societe_id = 12;

  // Initial addresses
  repeated CreateAdresseRequest adresses = 13;
}

message UpdateClientBaseRequest {
  string id = 1;

  // Optional updates - only set fields will be updated
  optional ClientType type_client = 2;
  optional string compte_code = 3;
  optional string statut = 4;

  optional ClientIdentity identity = 5;
  optional ClientContact contact = 6;
  optional ClientBanking banking = 7;
  optional ClientServices services = 8;
  optional ClientCompliance compliance = 9;
  optional ClientAcquisition acquisition = 10;

  optional string partenaire_id = 11;
  optional string societe_id = 12;
}

message GetClientBaseRequest {
  string id = 1;
}

message ListClientsBaseRequest {
  string organisation_id = 1;
  optional string statut_id = 2;
  optional string societe_id = 3;
  optional string search = 4;         // Full-text search on nom, email, telephone
  optional string source = 5;
  optional ClientType type_client = 6;
  optional string partenaire_id = 7;
  common.PaginationRequest pagination = 8;
}

message ListClientsBaseResponse {
  repeated ClientSummary clients = 1;  // Use summary for lists
  common.PaginationResponse pagination = 2;
}

message DeleteClientBaseRequest {
  string id = 1;
  bool hard_delete = 2;               // If false, soft delete
}

message SearchClientRequest {
  string organisation_id = 1;
  string telephone = 2;
  string nom = 3;
  string email = 4;
}

message SearchClientResponse {
  bool found = 1;
  ClientBase client = 2;
}

// Batch operations
message GetClientsByIdsRequest {
  repeated string ids = 1;
}

message GetClientsByIdsResponse {
  repeated ClientBase clients = 1;
  repeated string not_found_ids = 2;
}

// === CLIENT ENTREPRISE ===

message ClientEntreprise {
  string id = 1;
  string raison_sociale = 2;
  string numero_tva = 3;
  string siren = 4;
  string siret = 5;
  string code_naf = 6;
  string forme_juridique = 7;
  common.Money capital_social = 8;
  google.protobuf.Timestamp date_creation_entreprise = 9;
  string representant_legal_id = 10;  // Reference to ClientBase
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;

  reserved 50 to 100;
}

message CreateClientEntrepriseRequest {
  string raison_sociale = 1;
  string numero_tva = 2;
  string siren = 3;
  string siret = 4;
  string code_naf = 5;
  string forme_juridique = 6;
  common.Money capital_social = 7;
  google.protobuf.Timestamp date_creation_entreprise = 8;
  string representant_legal_id = 9;
}

message UpdateClientEntrepriseRequest {
  string id = 1;
  optional string raison_sociale = 2;
  optional string numero_tva = 3;
  optional string siren = 4;
  optional string siret = 5;
  optional string code_naf = 6;
  optional string forme_juridique = 7;
  optional common.Money capital_social = 8;
}

message GetClientEntrepriseRequest {
  string id = 1;
}

message ListClientsEntrepriseRequest {
  string organisation_id = 1;
  optional string search = 2;
  common.PaginationRequest pagination = 3;
}

message ListClientsEntrepriseResponse {
  repeated ClientEntreprise clients = 1;
  common.PaginationResponse pagination = 2;
}

message DeleteClientEntrepriseRequest {
  string id = 1;
}

// === CLIENT PARTENAIRE ===

message ClientPartenaire {
  string id = 1;
  string client_base_id = 2;
  string partenaire_id = 3;
  string role_partenaire_id = 4;
  google.protobuf.Timestamp valid_from = 5;
  google.protobuf.Timestamp valid_to = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;

  reserved 50 to 100;
}

message CreateClientPartenaireRequest {
  string client_base_id = 1;
  string partenaire_id = 2;
  string role_partenaire_id = 3;
  google.protobuf.Timestamp valid_from = 4;
  google.protobuf.Timestamp valid_to = 5;
}

message UpdateClientPartenaireRequest {
  string id = 1;
  optional string partenaire_id = 2;
  optional string role_partenaire_id = 3;
  optional google.protobuf.Timestamp valid_from = 4;
  optional google.protobuf.Timestamp valid_to = 5;
  optional bool is_active = 6;
}

message GetClientPartenaireRequest {
  string id = 1;
}

message ListClientsPartenaireRequest {
  optional string client_base_id = 1;
  optional string partenaire_id = 2;
  optional bool active_only = 3;
  common.PaginationRequest pagination = 4;
}

message ListClientsPartenaireResponse {
  repeated ClientPartenaire clients = 1;
  common.PaginationResponse pagination = 2;
}

message DeleteClientPartenaireRequest {
  string id = 1;
}

// === SERVICES ===

service StatutClientService {
  rpc Create(CreateStatutClientRequest) returns (StatutClient);
  rpc Update(UpdateStatutClientRequest) returns (StatutClient);
  rpc Get(GetStatutClientRequest) returns (StatutClient);
  rpc GetByCode(GetStatutClientByCodeRequest) returns (StatutClient);
  rpc List(ListStatutsClientRequest) returns (ListStatutsClientResponse);
  rpc Delete(DeleteStatutClientRequest) returns (common.DeleteResponse);
}

service AdresseService {
  rpc Create(CreateAdresseRequest) returns (Adresse);
  rpc Update(UpdateAdresseRequest) returns (Adresse);
  rpc Get(GetAdresseRequest) returns (Adresse);
  rpc ListByClient(ListAdressesRequest) returns (ListAdressesResponse);
  rpc Delete(DeleteAdresseRequest) returns (common.DeleteResponse);
}

service ClientBaseService {
  rpc Create(CreateClientBaseRequest) returns (ClientBase);
  rpc Update(UpdateClientBaseRequest) returns (ClientBase);
  rpc Get(GetClientBaseRequest) returns (ClientBase);
  rpc List(ListClientsBaseRequest) returns (ListClientsBaseResponse);
  rpc Delete(DeleteClientBaseRequest) returns (common.DeleteResponse);
  rpc Search(SearchClientRequest) returns (SearchClientResponse);
  rpc GetByIds(GetClientsByIdsRequest) returns (GetClientsByIdsResponse);

  // Streaming for large exports
  rpc StreamClients(ListClientsBaseRequest) returns (stream ClientBase);
}

service ClientEntrepriseService {
  rpc Create(CreateClientEntrepriseRequest) returns (ClientEntreprise);
  rpc Update(UpdateClientEntrepriseRequest) returns (ClientEntreprise);
  rpc Get(GetClientEntrepriseRequest) returns (ClientEntreprise);
  rpc List(ListClientsEntrepriseRequest) returns (ListClientsEntrepriseResponse);
  rpc Delete(DeleteClientEntrepriseRequest) returns (common.DeleteResponse);
}

service ClientPartenaireService {
  rpc Create(CreateClientPartenaireRequest) returns (ClientPartenaire);
  rpc Update(UpdateClientPartenaireRequest) returns (ClientPartenaire);
  rpc Get(GetClientPartenaireRequest) returns (ClientPartenaire);
  rpc List(ListClientsPartenaireRequest) returns (ListClientsPartenaireResponse);
  rpc Delete(DeleteClientPartenaireRequest) returns (common.DeleteResponse);
}
