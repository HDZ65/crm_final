# ============================================================================
# PORTS.YAML — Registre canonique des ports · finanssor
# ============================================================================
# Source de vérité pour toute attribution de port sur ce serveur.
# Toute modification de port dans un compose file DOIT être reflétée ici.
# Le script audit-drift.sh vérifie la cohérence runtime vs ce fichier.
# ============================================================================

meta:
  server: finanssor
  ip_lan: "192.168.1.134"
  ip_tailscale: "100.68.221.26"
  ip_public: "85.31.109.231"
  tailnet: tail446cc0.ts.net
  last_audit: "2026-03-03"

# ----------------------------------------------------------------------------
# Plages reservees par slot (HTTP uniquement — services internes en docker network only)
# Slot 0 = INTERDIT (plage basse reservee, regle 0-99)
# Slot | Projet           | HTTP
#   0  | INTERDIT         | 3000-3099
#   1  | Chatbot          | 3100-3199
#   2  | Winaity Connect  | 3200-3299
#   3  | *Libre*          | 3300-3399
#   4  | Alex CRM         | 3400-3499
#   5  | R-Win            | 3500-3599
#   6-9| *Libre*          | 3600-3999
# DB, Redis, NATS, gRPC, Consul = docker network only, aucun port host alloue.
# ----------------------------------------------------------------------------
ranges:
  system:
    range: "1-1023"
    note: "Ports privilegies, usage OS uniquement. Plage 0-99 reservee — aucun service applicatif"
  ssh:
    range: "22, 2224"
    note: "SSH host + GitLab SSH"
  chatbot:  # slot 1
    http: "3100-3199"
    note: "Actif - ports actuels 3100/3101/3102/3103. Services internes: docker network only"
  winaity-connect:  # slot 2
    http: "3200-3299"
    note: "Actif - dev(3200 interne)/staging(3210)/prod(3220-3231). Services internes: docker network only"
  alex-crm:  # slot 4
    http: "3400-3499"
    note: "Actif - ports 3400-3406. Services internes (pg/redis/nats/consul): docker network only"
  r-win:  # slot 5
    http: "3500-3599"
    note: "Actif - ports 3500/3501. Postgres: docker network only (plus de host bind)"
  monitoring:
    range: "8080, 9029, 9090, 9100, 9115"
    note: "cadvisor, grafana, prometheus, node-exporter, blackbox-exporter"
  gitlab:
    range: "8900, 2224"
  tools:
    range: "8880-8899, 9000, 9150-9151, 11434"
    note: "kokoro-tts, focalboard, hexstrike-ai, minio, whisper-stt, ollama"
