# ============================================================================
# Légende access:
#   tunnel     = accessible monde via Cloudflare Tunnel uniquement
#   tailscale  = accessible via Tailscale (IP 100.68.221.26 ou tailscale serve)
#   internal   = docker network only, pas de port host nécessaire
#   loopback   = 127.0.0.1 uniquement (accès local process)
#   world      = exposé WAN (à éliminer sauf cas justifié)
#
# Légende bind_target:
#   "127.0.0.1"       = loopback (cloudflared host network y accède)
#   "100.68.221.26"   = Tailscale IP uniquement
#   internal           = supprimer ports: du compose, utiliser docker network
#   tailscale-serve    = exposer via tailscale serve (HTTPS auto)
#   host-network       = network_mode: host (cloudflared)
# ============================================================================
